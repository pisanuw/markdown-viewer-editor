name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    name: Lint (shellcheck + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck is preinstalled on ubuntu-latest runners.
      - name: ShellCheck bin scripts
        run: shellcheck bin/*.sh

      # Fail if README references a repo-relative file that does not exist
      # (catches the broken-screenshot class of regression).
      - name: Check README relative links resolve
        run: |
          missing=0
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ ! -e "$path" ]; then
              echo "README references a missing file: $path"
              missing=1
            fi
          done < <(grep -oE '\]\([^)]+\)' README.md \
                   | sed -E 's/^\]\(//; s/\)$//' \
                   | grep -vE '^https?://|^#|^mailto:')
          exit $missing
